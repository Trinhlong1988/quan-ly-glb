# electron-builder — G10 (.exe packaging) trên PostgreSQL (pg pure-JS, KHÔNG native addon).
# Generator Prisma = prisma-client (queryCompiler): KHÔNG có query-engine binary.
# - Generated client + pg query-compiler wasm (base64) đã được electron-vite BUNDLE vào out/main
#   (chunk query_compiler_fast_bg.postgresql.wasm-base64-*.js) → nằm trong asar, load bằng WebAssembly
#   từ base64 (không đọc file) nên KHÔNG cần asarUnpack.
# - Runtime external cần trong node_modules: @prisma/adapter-pg, @prisma/client, pg
#   (đều pure-JS → chạy trực tiếp từ asar, KHÔNG cần asarUnpack native).
appId: com.globeway.glb
productName: Quản Lý GLB
# electron hoisted lên node_modules gốc (monorepo) + devDep khai báo dạng range "^33.2.0"
# → electron-builder 26 không tự suy ra được exact version. Ghim theo bản ĐANG cài (verified 33.4.11).
electronVersion: 33.4.11

directories:
  output: dist
  buildResources: build

# App code đã được electron-vite bundle vào out/. node_modules production deps
# (pg, @prisma/*) được electron-builder tự thu thập theo dependency graph
# (kể cả khi hoisted lên node_modules gốc của monorepo npm workspaces).
files:
  - out/**/*
  - package.json
  # Client KHÔNG dùng DB local (G10 model A: nối thẳng Postgres máy chủ) — không gói file DB.
  - "!**/*.db"
  - "!**/*.db.*"
  - "!**/*.map"

# pg + Prisma client đều pure-JS (không native .node) → KHÔNG cần asarUnpack.

win:
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # [M1] Tên file ASCII: productName "Quản Lý GLB" có dấu+space → tên phi-ASCII dễ gãy khi
  # electron-updater tải qua HTTP. latest.yml sẽ tham chiếu tên ASCII này (giữ productName để hiển thị).
  artifactName: glb-${version}-setup.${ext}

# G11 — Feed cập nhật LAN (electron-updater). LEAD dựng HTTP tĩnh cổng 8686 phục vụ D:\glb-updates\.
# quitAndInstall(true,…) truyền /S nên tự cập nhật vẫn cài IM dù oneClick=false (cài tay lần đầu).
publish:
  provider: generic
  url: http://192.168.1.6:8686/updates/
  channel: latest
